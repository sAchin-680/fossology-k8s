# KEDA ScaledObject — placeholder for a future nomos-specific worker pool.
#
# Nomos is FOSSology's license scanner. When a dedicated nomos StatefulSet is introduced
# (e.g. fossology-nomos-workers), this ScaledObject will scale it independently of the
# general worker pool, allowing nomos jobs to scale without displacing other agent types.
#
# Current status: NOT DEPLOYED — the fossology-nomos-workers StatefulSet does not yet exist.
# This file is a template to be activated when that workload is created.
#
# To activate:
#   1. Create a fossology-nomos-workers StatefulSet (mirroring workers/statefulset.yaml
#      but with a nomos-optimised resource profile and the nomos agent only).
#   2. Ensure fossology-keda-db-conn Secret exists (see scaledobject-workers.yaml).
#   3. Update the query below to filter specifically for nomos jobs:
#        SELECT COUNT(*) FROM jobqueue
#        WHERE jq_endtime IS NULL AND jq_schedinfo IS NULL
#        AND jq_type = 'nomos'
#      (Adjust jq_type value to match the nomos agent identifier in your FOSSology DB.)
#   4. Remove this comment block and apply with:
#        kubectl apply -f keda/scaledobject-nomos.yaml

