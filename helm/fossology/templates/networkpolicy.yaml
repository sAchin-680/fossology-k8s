# NetworkPolicies — restrict traffic between FOSSology components.
#
# Note: kind's default CNI (kindnet) does NOT enforce NetworkPolicy.
# For local testing install Calico:
#   kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico.yaml
# These policies are included for production readiness.

# Workers: accept SSH only from the scheduler
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fossology.fullname" . }}-workers-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fossology.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fossology.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "fossology.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: scheduler
      ports:
        - port: {{ .Values.workers.sshPort }}
          protocol: TCP
---
# PostgreSQL: accept connections only from web, scheduler, and workers
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fossology.fullname" . }}-postgres-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fossology.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fossology.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "fossology.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: web
        - podSelector:
            matchLabels:
              {{- include "fossology.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: scheduler
        - podSelector:
            matchLabels:
              {{- include "fossology.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: worker
      ports:
        - port: 5432
          protocol: TCP
---
# Web UI: accept HTTP from anywhere (external users + port-forward)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fossology.fullname" . }}-web-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fossology.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fossology.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
---
# Scheduler: accept from web (REST API / CLI commands)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fossology.fullname" . }}-scheduler-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fossology.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fossology.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scheduler
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "fossology.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: web
      ports:
        - port: 24693
          protocol: TCP
