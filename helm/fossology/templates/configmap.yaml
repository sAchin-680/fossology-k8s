apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fossology.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fossology.labels" . | nindent 4 }}
data:
  # NOTE: the FOSSology entrypoint overwrites Db.conf at container startup
  # from FOSSOLOGY_DB_* environment variables (sourced from the Secret).
  # Password is intentionally omitted here — it is injected at runtime via
  # the FOSSOLOGY_DB_PASSWORD env var sourced from the fossology-db Secret.
  Db.conf: |
    dbname={{ .Values.fossology.db.name }};
    host={{ include "fossology.dbHost" . }};
    user={{ .Values.fossology.db.user }};
    password=;
    client_encoding=utf8;

  # Worker-facing fossology.conf — mounted into worker pods at runtime.
  # Workers run agents locally (localhost), so [HOSTS] stays as localhost.
  # The scheduler gets its own copy with worker pod hostnames injected by
  # the init container (see scheduler/deployment.yaml).
  fossology.conf: |
    ; FOSSology configuration — worker-facing copy (mounted via ConfigMap).
    ; The scheduler uses its own copy (patched by init container).

    [FOSSOLOGY]
    port = 24693
    address = localhost
    depth = 3
    path = /srv/fossology/repository

    [HOSTS]
    localhost = localhost AGENT_DIR 10

    [REPOSITORY]
    localhost[] = * 00 ff

    [DIRECTORIES]
    PROJECT=fossology
    PROJECTGROUP=fossy
    PROJECTUSER=fossy
    PREFIX=/usr/local
    BINDIR=$PREFIX/bin
    SBINDIR=$PREFIX/sbin
    LIBDIR=$PREFIX/lib
    INCLUDEDIR=$PREFIX/include
    LIBEXECDIR=$PREFIX/lib/$PROJECT
    DATAROOTDIR=$PREFIX/share
    MODDIR=$DATAROOTDIR/$PROJECT
    LOCALSTATEDIR=/var/local
    PROJECTSTATEDIR=$LOCALSTATEDIR/lib/$PROJECT
    CACHEDIR=$LOCALSTATEDIR/cache/$PROJECT
    LOGDIR=/var/log/$PROJECT

    [EMAILNOTIFY]
    header  = sampleheader.txt
    footer  = samplefooter.txt
    subject = FOSSology scan complete
    client  = /usr/bin/s-nail

    [AUTHENTICATION]
    provider = password
    resttoken = token
