apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fossology.fullname" . }}-scheduler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fossology.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fossology.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        {{- include "fossology.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: scheduler
        app: fossology-scheduler
    spec:
      # ─────────────────────────────────────────────────────────────────────
      # Init container handles two setup tasks before fo_scheduler starts:
      #
      # 1. SSH key — the fossology entrypoint drops to fossy (uid=999) via
      #    setuid() before forking SSH agents. K8s mounts Secrets as root-owned
      #    files, so we copy the private key into an emptyDir and chown it to
      #    fossy so it is readable after the privilege drop.
      #
      # 2. fossology.conf — the entrypoint runs `sed -i` on fossology.conf to
      #    update the 'address' field. ConfigMap subPath mounts are read-only
      #    bind mounts, so sed -i fails. We instead copy the image's original
      #    fossology.conf into a writable emptyDir, inject the worker [HOSTS]
      #    entries (dynamically generated by Helm range loop from workers.replicas),
      #    and mount that emptyDir over /usr/local/etc/fossology/ so the
      #    entrypoint can freely modify it.
      # ─────────────────────────────────────────────────────────────────────
      initContainers:
        - name: setup-scheduler
          image: {{ include "fossology.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ['/bin/bash', '-c']
          args:
            - |
              set -e

              # ── 1. SSH private key ──────────────────────────────────────────
              cp /run/ssh-staging/id_ed25519 /home/fossy-ssh/id_ed25519
              chmod 600 /home/fossy-ssh/id_ed25519
              chown 999:999 /home/fossy-ssh/id_ed25519
              # Disable strict host key checking — workers have ephemeral host keys
              cat > /home/fossy-ssh/config <<'SSHEOF'
              Host *
                StrictHostKeyChecking no
                UserKnownHostsFile /dev/null
                LogLevel ERROR
              SSHEOF
              chmod 600 /home/fossy-ssh/config
              chown 999:999 /home/fossy-ssh/config

              # ── 2. fossology.conf in writable emptyDir ─────────────────────
              # Copy everything from the image's etc dir so the entrypoint can
              # overwrite files freely (Db.conf, fossology.conf address patch).
              cp -a /usr/local/etc/fossology/. /run/fossology-etc/

              # Inject worker pods into [HOSTS] section (insert before [REPOSITORY])
              # Remove localhost so scheduler never tries to run agents locally
              sed -i '/^localhost\s*=/d' /run/fossology-etc/fossology.conf
              # ── Helm range loop: one entry per worker replica ───────────────
              # Each sed call inserts one worker line before [REPOSITORY].
              # Running i=0 first, i=1 second, ... preserves ascending order.
{{- range $i, $_ := until (.Values.workers.replicas | int) }}
              sed -i '/^\[REPOSITORY\]/i {{ include "fossology.workerServiceName" $ }}-{{ $i }} = {{ include "fossology.workerServiceName" $ }}-{{ $i }}.{{ include "fossology.workerServiceName" $ }}.{{ $.Release.Namespace }}.svc.cluster.local \/usr\/local\/etc\/fossology {{ $.Values.workers.maxAgents }}' /run/fossology-etc/fossology.conf
{{- end }}

              # ── 3. Trim mods-enabled to a minimal set ──────────────────────
              # The scheduler startup test spawns one QEMU-emulated thread per
              # (agent x host). With all agents x all hosts the GLib thread pool
              # SIGSEGVs under emulation.  Keep agents needed for a basic license
              # scan: ununpack + adj2nest (unpack pipeline), mimetype, nomos, monk
              # copyright. 7 agents x 2 workers = 14 threads — safe for QEMU.
              KEEP="nomos ununpack mimetype adj2nest monk copyright deciderjob"
              for entry in /run/fossology-etc/mods-enabled/*; do
                mod=$(basename "$entry")
                keep=0
                for k in $KEEP; do [ "$mod" = "$k" ] && keep=1 && break; done
                [ $keep -eq 0 ] && rm -rf "$entry"
              done
          volumeMounts:
            - name: ssh-staging
              mountPath: /run/ssh-staging
              readOnly: true
            - name: fossy-ssh-home
              mountPath: /home/fossy-ssh
            - name: fossology-etc
              mountPath: /run/fossology-etc

      containers:
        - name: scheduler
          image: {{ include "fossology.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["scheduler"]
          env:
            - name: FOSSOLOGY_DB_HOST
              value: {{ include "fossology.dbHost" . }}
            - name: FOSSOLOGY_DB_NAME
              value: {{ .Values.fossology.db.name }}
            - name: FOSSOLOGY_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "fossology.dbSecretName" . }}
                  key: POSTGRES_USER
            - name: FOSSOLOGY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fossology.dbSecretName" . }}
                  key: POSTGRES_PASSWORD
            # QEMU x86_64-on-ARM stability: disable GLib slice allocator and
            # limit malloc arenas to prevent SIGSEGV under emulated threading
            - name: G_SLICE
              value: always-malloc
            - name: MALLOC_ARENA_MAX
              value: "1"
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: 24693
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 24693
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          volumeMounts:
            - name: repo
              mountPath: /srv/fossology/repository
            # fossy's ~/.ssh — populated by init container with mode-600 key
            - name: fossy-ssh-home
              mountPath: /home/fossy/.ssh
            # Writable emptyDir (with patched fossology.conf) replaces the
            # image's /usr/local/etc/fossology so the entrypoint can sed it
            - name: fossology-etc
              mountPath: /usr/local/etc/fossology

      volumes:
        - name: repo
          persistentVolumeClaim:
            claimName: {{ include "fossology.repoPVCName" . }}
        # Secret mounted read-only for init container only
        - name: ssh-staging
          secret:
            secretName: {{ include "fossology.sshSecretName" . }}
            defaultMode: 0400
        # emptyDir for fossy's .ssh (key + config, correctly permissioned)
        - name: fossy-ssh-home
          emptyDir: {}
        # emptyDir for /usr/local/etc/fossology (writable, pre-populated by init)
        - name: fossology-etc
          emptyDir: {}
