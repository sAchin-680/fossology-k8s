# Dev overlay — lighter resources for local kind clusters.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  # Single worker replica for local dev (saves resources)
  - target:
      kind: StatefulSet
      name: fossology-workers
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Smaller resource limits for kind
  - target:
      kind: Deployment
      name: fossology-scheduler
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  - target:
      kind: Deployment
      name: fossology-web
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
