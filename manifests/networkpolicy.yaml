# NetworkPolicies — restrict traffic between FOSSology components.
#
# Note: kind's default CNI (kindnet) does NOT enforce NetworkPolicy.
# For local testing install Calico:
#   kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico.yaml
# These policies are provided for production readiness and documentation.

# Workers: accept SSH only from the scheduler
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workers-ingress
  namespace: fossology
spec:
  podSelector:
    matchLabels:
      app: fossology-worker
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: fossology-scheduler
      ports:
        - port: 22
          protocol: TCP
---
# PostgreSQL: accept connections only from web, scheduler, and workers
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress
  namespace: fossology
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: fossology-web
        - podSelector:
            matchLabels:
              app: fossology-scheduler
        - podSelector:
            matchLabels:
              app: fossology-worker
      ports:
        - port: 5432
          protocol: TCP
---
# Web UI: accept HTTP from anywhere (external users + port-forward)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-ingress
  namespace: fossology
spec:
  podSelector:
    matchLabels:
      app: fossology-web
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
---
# Scheduler: accept from web (REST API / CLI commands)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: scheduler-ingress
  namespace: fossology
spec:
  podSelector:
    matchLabels:
      app: fossology-scheduler
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: fossology-web
      ports:
        - port: 24693
          protocol: TCP
