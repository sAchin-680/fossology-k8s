# Worker StatefulSet — SSH-accessible fossology agent runners
# Two pods: fossology-workers-0 and fossology-workers-1
# Addressed via headless Service: fossology-workers.<namespace>.svc.cluster.local
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fossology-workers
  namespace: fossology
spec:
  serviceName: fossology-workers
  replicas: 2
  selector:
    matchLabels:
      app: fossology-worker
  template:
    metadata:
      labels:
        app: fossology-worker
    spec:
      containers:
        - name: worker
          image: 172.19.0.3:5000/fossology-worker:poc
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 22
              name: ssh
          volumeMounts:
            # Public key — sshd reads this to authenticate the scheduler's private key
            - name: ssh-keys
              mountPath: /home/fossy/.ssh/authorized_keys
              subPath: authorized_keys
            # Shared repository storage — same PVC as web + scheduler
            - name: repo
              mountPath: /srv/fossology/repository
            # Database config — mounted from ConfigMap; agents use this to connect
            - name: config
              mountPath: /usr/local/etc/fossology/Db.conf
              subPath: Db.conf
            # fossology.conf — gives workers knowledge of scheduler address etc.
            - name: config
              mountPath: /usr/local/etc/fossology/fossology.conf
              subPath: fossology.conf
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: '2'
              memory: 2Gi
          livenessProbe:
            tcpSocket:
              port: 22
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 22
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
      volumes:
        - name: ssh-keys
          secret:
            secretName: fossology-ssh-keys
            # 0644 = owner rw, group r, world r.  StrictModes=no in sshd_config
            # so the root-owned mount is accepted for authorized_keys.
            defaultMode: 0644
        - name: repo
          persistentVolumeClaim:
            claimName: fossology-repo
        - name: config
          configMap:
            name: fossology-config
---
# Headless Service — gives each pod a stable DNS name:
# fossology-workers-<ordinal>.fossology-workers.fossology.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: fossology-workers
  namespace: fossology
spec:
  clusterIP: None # headless — no VIP, direct pod DNS
  selector:
    app: fossology-worker
  ports:
    - port: 22
      targetPort: 22
      name: ssh
