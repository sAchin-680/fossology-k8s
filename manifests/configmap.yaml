apiVersion: v1
kind: ConfigMap
metadata:
  name: fossology-config
  namespace: fossology
data:
  # NOTE: entrypoint overwrites Db.conf at startup from env vars; this is kept
  # for reference only. Format must match entrypoint output (key=value; no spaces).
  Db.conf: |
    dbname=fossology;
    host=postgres;
    user=fossy;
    password=fossy;
    client_encoding=utf8;
  fossology.conf: |
    ; FOSSology configuration — worker-facing copy (mounted via ConfigMap).
    ; The scheduler uses its own copy (patched by init container).

    [FOSSOLOGY]
    port = 24693
    address = localhost
    depth = 3
    path = /srv/fossology/repository

    [HOSTS]
    localhost = localhost AGENT_DIR 10

    [REPOSITORY]
    localhost[] = * 00 ff

    [DIRECTORIES]
    PROJECT=fossology
    PROJECTGROUP=fossy
    PROJECTUSER=fossy
    PREFIX=/usr/local
    BINDIR=$PREFIX/bin
    SBINDIR=$PREFIX/sbin
    LIBDIR=$PREFIX/lib
    INCLUDEDIR=$PREFIX/include
    LIBEXECDIR=$PREFIX/lib/$PROJECT
    DATAROOTDIR=$PREFIX/share
    MODDIR=$DATAROOTDIR/$PROJECT
    LOCALSTATEDIR=/var/local
    PROJECTSTATEDIR=$LOCALSTATEDIR/lib/$PROJECT
    CACHEDIR=$LOCALSTATEDIR/cache/$PROJECT
    LOGDIR=/var/log/$PROJECT

    [EMAILNOTIFY]
    header  = sampleheader.txt
    footer  = samplefooter.txt
    subject = FOSSology scan complete
    client  = /usr/bin/s-nail

    [AUTHENTICATION]
    provider = password
    resttoken = token
