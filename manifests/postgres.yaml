apiVersion: v1
kind: Secret
metadata:
  name: fossology-db-secret
  namespace: fossology
stringData:
  POSTGRES_PASSWORD: fossy
  POSTGRES_USER: fossy
  POSTGRES_DB: fossology
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: fossology
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_INITDB_ARGS
              value: '-E SQL_ASCII'
          envFrom:
            - secretRef:
                name: fossology-db-secret
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - fossy
                - -d
                - fossology
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: fossology
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
